services:
  - type: web
    name: sakura-api
    runtime: node
    region: frankfurt
    rootDir: backend
    buildCommand: npm install && npx prisma generate
    startCommand: npx tsx src/index.ts
    envVars:
      - key: PORT
        value: "4000"
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: SMS_API_KEY
        sync: false
      - key: DGIS_API_KEY
        sync: false
      - key: DGIS_FIRM_ID
        sync: false
      - key: YANDEX_ORG_ID
        sync: false
